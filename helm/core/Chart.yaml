apiVersion: v2
appVersion: 2.2.1
description: Helm chart for deploying higress gateways
icon: https://higress.io/img/higress_logo_small.png
home: http://higress.io/
keywords:
  - higress
  - gateways
name: higress-core
sources:
  - http://github.com/alibaba/higress
dependencies:
  - condition: redis.enabled
    name: redis
    repository: "file://charts/redis-ha"
    version: 25.3.11
  - alias: postgresql
    condition: postgresql.enabled
    name: postgresql-ha
    repository: "file://charts/postgresql-ha"
    version: 16.3.2
  - condition: mysql.mysql.enabled
    name: mysql
    repository: "file://charts/mysql"
    version: 8.0.0
type: application
version: 2.2.1
