{{- if .Values.mysql.enabled }}
{{- $isMariaDB := contains "mariadb" (lower (include "higress-core-mysql.image.repository" .)) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "higress-core-mysql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "higress-core-mysql.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "higress-core-mysql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "higress-core-mysql.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "higress-core-mysql.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mysql
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "higress-core-mysql.image.repository" . }}:{{ include "higress-core-mysql.image.tag" . }}"
          imagePullPolicy: {{ include "higress-core-mysql.image.pullPolicy" . }}
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            {{- if not $isMariaDB }}
            - --default-authentication-plugin=mysql_native_password
            {{- end }}
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.databaseKey }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.usernameKey }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.passwordKey }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.rootPasswordKey }}
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.databaseKey }}
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.usernameKey }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.passwordKey }}
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "higress-core-mysql.authSecretName" . }}
                  key: {{ .Values.auth.rootPasswordKey }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  if command -v mariadb-admin >/dev/null 2>&1; then
                    mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"
                  else
                    mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
                  fi
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  if command -v mariadb-admin >/dev/null 2>&1; then
                    mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"
                  else
                    mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
                  fi
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      {{- if not .Values.primary.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.primary.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.primary.persistence.storageClass }}
        storageClassName: {{ .Values.primary.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.primary.persistence.size }}
  {{- end }}
{{- end }}
