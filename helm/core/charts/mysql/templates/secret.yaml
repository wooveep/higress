{{- if and .Values.mysql.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "higress-core-mysql.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "higress-core-mysql.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{ .Values.auth.usernameKey }}: {{ .Values.auth.username | quote }}
  {{ .Values.auth.passwordKey }}: {{ .Values.auth.password | quote }}
  {{ .Values.auth.databaseKey }}: {{ .Values.auth.database | quote }}
  {{ .Values.auth.rootPasswordKey }}: {{ .Values.auth.rootPassword | quote }}
{{- end }}
