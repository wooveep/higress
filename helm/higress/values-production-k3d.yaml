# Production values for k3d deployment.
# This profile keeps production-grade component choices while enabling
# observability and portal metrics linkage by default.

global:
  local: false
  ingressClass: aigateway
  enableRedis: true
  imagePullPolicy: IfNotPresent
  o11y:
    enabled: true
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
    promtail:
      image:
        repository: aigateway/promtail
        tag: 2.9.4

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: true
      name: mysql-server
      repository: aigateway/mariadb
      tag: "11.4"
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  gateway:
    repository: aigateway/gateway
    tag: "2.2.0-dev-20260419132939"
    service:
      type: LoadBalancer
    hostPort:
      enabled: false
  controller:
    repository: aigateway/controller
    tag: "2.2.0-dev-20260419132939"
  pilot:
    repository: aigateway/pilot
    tag: "2.2.0-dev-20260419132939"
  pluginServer:
    repository: aigateway/plugin-server
    tag: "1.0.0-dev-20260419132939"
  redis:
    enabled: true
    image:
      repository: aigateway/redis-stack-server
      tag: "7.4.0"

aigateway-console:
  enabled: true
  name: aigateway-console
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  service:
    type: LoadBalancer
    port: 8080
  image:
    repository: aigateway/console
    tag: "2.2.0-dev-20260422064512"
    pullPolicy: IfNotPresent
  pluginServer:
    serviceName: aigateway-plugin-server
  certmanager:
    image:
      repository: aigateway
      tag: dev-20260419132939
  portalDatabase:
    enabled: true
    host: mysql-server

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  backend:
    corePrometheusURL: "http://aigateway-console-prometheus:9090/prometheus"
    usageSyncEnabled: true
    usageSyncSeconds: 300
    keyAuthSyncEnabled: true
    keyAuthSyncSeconds: 2
    rechargeFallbackAvgCostPer1K: 0.02
  database:
    createSecret: false
    host: mysql-server
  image:
    repository: aigateway/portal
    tag: "0.2.0-dev-20260421141000"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8081
  ingress:
    enabled: false
  session:
    secretKey: change-me-session-secret
