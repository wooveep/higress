{{- $core := index .Values "higress-core" -}}
{{- if and $core.enabled $core.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: aigateway-core-db
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: aigateway-core-db
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  username: {{ $core.postgresql.postgresql.username | quote }}
  password: {{ $core.postgresql.postgresql.password | quote }}
  database: {{ $core.postgresql.postgresql.database | quote }}
{{- end }}
