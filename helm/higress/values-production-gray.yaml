# Production gray deployment values for the parent higress chart.
# Update tag values if your release pipeline publishes a different version.

global:
  local: false
  ingressClass: aigateway
  enableRedis: true
  imagePullPolicy: IfNotPresent
  o11y:
    enabled: false
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
    promtail:
      image:
        repository: aigateway/promtail
        tag: 2.9.4

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: true
      name: mysql-server
      repository: aigateway/mariadb
      tag: "11.4"
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  gateway:
    repository: aigateway/gateway
    tag: "2.2.0"
  controller:
    repository: aigateway/controller
    tag: "2.2.0"
  pilot:
    repository: aigateway/pilot
    tag: "2.2.0"
  pluginServer:
    repository: aigateway/plugin-server
    tag: "1.0.0"
  redis:
    redis:
      repository: aigateway/redis-stack-server
      tag: "7.4.0"

aigateway-console:
  enabled: true
  name: aigateway-console
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  image:
    repository: aigateway/console
    tag: "2.1.0"
    pullPolicy: IfNotPresent
  pluginServer:
    serviceName: aigateway-plugin-server
  certmanager:
    image:
      repository: aigateway
      tag: v1.11.0
  portalDatabase:
    enabled: true
    host: mysql-server

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  database:
    createSecret: false
    host: mysql-server
  image:
    repository: aigateway/portal
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 8081
  ingress:
    enabled: false
  session:
    secretKey: change-me-session-secret
