global:
  ingressClass: aigateway
  local: true
  enableRedis: true
  enablePluginServer: true
  onlyPushRouteCluster: false
  o11y:
    enabled: true
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
      pvc:
        enabled: false
    promtail:
      image:
        repository: aigateway/promtail
        tag: 2.9.4
  imagePullPolicy: IfNotPresent

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: true
      name: mysql-server
      repository: aigateway/mariadb
      tag: "11.4"
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  gateway:
    name: aigateway-gateway
    repository: aigateway/gateway
    tag: "2.2.0-dev-20260327030541"
    service:
      type: LoadBalancer
    hostPort:
      enabled: false
  controller:
    name: aigateway-controller
    repository: aigateway/controller
    tag: "2.2.0-dev-20260327030541"
  pilot:
    repository: aigateway/pilot
    tag: "2.2.0-dev-20260327030541"
  pluginServer:
    name: aigateway-plugin-server
    replicas: 1
    repository: aigateway/plugin-server
    tag: "1.0.0-dev-20260327030541"
  redis:
    redis:
      name: redis-stack-server
      repository: aigateway/redis-stack-server
      tag: "7.4.0"

aigateway-console:
  enabled: true
  name: aigateway-console
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  service:
    type: LoadBalancer
    port: 8080
  image:
    repository: aigateway/console
    tag: "2.2.0-dev-20260416215530"
    pullPolicy: IfNotPresent
  portalDatabase:
    enabled: true
    host: mysql-server

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  backend:
    corePrometheusURL: "http://aigateway-console-prometheus:9090/prometheus"
  database:
    createSecret: false
    host: mysql-server
  image:
    repository: aigateway/portal
    tag: "0.2.0-dev-20260416215530"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8081
  ingress:
    enabled: false
  session:
    secretKey: change-me-session-secret
