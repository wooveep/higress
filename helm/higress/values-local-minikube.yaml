global:
  ingressClass: aigateway
  local: true
  enableRedis: true
  enablePluginServer: true
  onlyPushRouteCluster: false
  o11y:
    enabled: true
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
      pvc:
        enabled: false
    promtail:
      enabled: false
      image:
        repository: aigateway/promtail
        tag: 2.9.4
  imagePullPolicy: IfNotPresent

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: false
  postgresql:
    enabled: true
    fullnameOverride: aigateway-core-postgresql
    postgresql:
      username: portal
      password: portal
      database: aigateway_portal
      postgresPassword: postgres
      repmgrPassword: repmgr
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql-repmgr
        tag: 17.6.0-debian-12-r2
      replicaCount: 1
      persistence:
        enabled: true
        size: 2Gi
    pgpool:
      replicaCount: 1
      adminPassword: admin
      srCheckPassword: srcheck
      image:
        registry: docker.io
        repository: bitnamilegacy/pgpool
        tag: 4.6.3-debian-12-r0
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  gateway:
    name: aigateway-gateway
    repository: aigateway/gateway
    tag: "1.1.0"
    service:
      type: LoadBalancer
    hostPort:
      enabled: false
  controller:
    name: aigateway-controller
    repository: aigateway/controller
    tag: "1.1.0"
  pilot:
    repository: aigateway/pilot
    tag: "1.1.0"
  pluginServer:
    name: aigateway-plugin-server
    replicas: 1
    repository: aigateway/plugin-server
    tag: "1.1.0"
  redis:
    enabled: true
    fullnameOverride: redis-server
    architecture: replication
    auth:
      enabled: true
      sentinel: true
      password: aigateway-redis
    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: 8.0.3-debian-12-r3
    sentinel:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis-sentinel
        tag: 8.0.3-debian-12-r2
      masterService:
        enabled: true
        ports:
          redis: 6379
    rbac:
      create: true
    serviceAccount:
      create: true
      automountServiceAccountToken: true
    master:
      persistence:
        enabled: true
        size: 1Gi
    replica:
      replicaCount: 1
      automountServiceAccountToken: true
      persistence:
        enabled: true
        size: 1Gi

aigateway-console:
  enabled: true
  name: aigateway-console
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  service:
    type: LoadBalancer
    port: 8080
  image:
    repository: aigateway/console
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  portalDatabase:
    enabled: true
    driver: postgres
    host: aigateway-core-postgresql-pgpool
    port: 5432
    database: aigateway_portal
    params: "sslmode=disable"
    secretName: aigateway-core-db
    usernameKey: username
    passwordKey: password

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  database:
    driver: postgres
    createSecret: false
    existingSecret: aigateway-core-db
    host: aigateway-core-postgresql-pgpool
    port: 5432
    name: aigateway_portal
    username: portal
    password: portal
    params: "sslmode=disable"
  backend:
    corePrometheusURL: "http://aigateway-console-prometheus:9090/prometheus"
  image:
    repository: aigateway/portal
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8081
  ingress:
    enabled: false
  session:
    secretKey: change-me-session-secret
