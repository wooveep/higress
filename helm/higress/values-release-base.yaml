global:
  local: false
  onlyPushRouteCluster: false
  ingressClass: aigateway
  enableRedis: true
  enablePluginServer: true
  imagePullPolicy: IfNotPresent
  o11y:
    enabled: true
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
      resources:
        limits:
          cpu: 300m
          memory: 512Mi
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
    promtail:
      image:
        repository: aigateway/promtail
        tag: 2.9.4

release:
  upstreams: []

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: false
  postgresql:
    enabled: true
    fullnameOverride: aigateway-core-postgresql
    postgresql:
      username: portal
      password: portal
      database: aigateway_portal
      postgresPassword: postgres
      replicaCount: 1
      persistence:
        enabled: true
        size: 10Gi
    pgpool:
      replicaCount: 1
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  redis:
    enabled: true
    fullnameOverride: redis-server
    serviceNameOverride: redis-server-master
    architecture: standalone
    auth:
      enabled: true
      sentinel: true
      password: aigateway-redis
    sentinel:
      enabled: false
      masterService:
        enabled: false
    rbac:
      create: true
    serviceAccount:
      create: true
      automountServiceAccountToken: true
    master:
      persistence:
        enabled: true
        size: 1Gi
    replica:
      replicaCount: 0
      automountServiceAccountToken: true
      persistence:
        enabled: true
        size: 1Gi
  gateway:
    repository: aigateway/gateway
    tag: "1.1.0"
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
    service:
      type: LoadBalancer
    hostPort:
      enabled: false
    pdb:
      enabled: false
      minAvailable: 1
  controller:
    repository: aigateway/controller
    tag: "1.1.0"
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi
    pdb:
      enabled: false
      minAvailable: 1
  pilot:
    repository: aigateway/pilot
    tag: "1.1.0"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
  pluginServer:
    repository: aigateway/plugin-server
    tag: "1.1.0"
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    pdb:
      enabled: false
      minAvailable: 1

aigateway-console:
  enabled: true
  name: aigateway-console
  replicaCount: 1
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    domain: console.aigateway.io
    paths:
      - path: /
        pathType: Prefix
  image:
    repository: aigateway/console
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  pluginServer:
    serviceName: aigateway-plugin-server
  certmanager:
    image:
      repository: aigateway
      tag: "1.1.0"
  portalDatabase:
    enabled: true
    driver: postgres
    host: aigateway-core-postgresql-pgpool
    port: 5432
    database: aigateway_portal
    params: "sslmode=disable"
    secretName: aigateway-core-db
    usernameKey: username
    passwordKey: password
  podEnvs:
    AIGATEWAY_CONSOLE_K8S_ENABLED: "true"
    AIGATEWAY_CONSOLE_PORTALDB_AUTO_MIGRATE: "false"
    HIGRESS_PORTAL_CONSUMER_PROJECTION_WRITE_ENABLED: "false"

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  database:
    driver: postgres
    createSecret: false
    existingSecret: aigateway-core-db
    host: aigateway-core-postgresql-pgpool
    port: 5432
    name: aigateway_portal
    username: portal
    password: portal
    params: "sslmode=disable"
  backend:
    replicaCount: 1
    dbAutoMigrate: false
    corePrometheusURL: "http://aigateway-console-prometheus:9090/prometheus"
    usageSyncEnabled: true
    usageSyncSeconds: 300
    keyAuthSyncEnabled: true
    keyAuthSyncSeconds: 2
    rechargeFallbackAvgCostPer1K: 0.02
  image:
    repository: aigateway/portal
    tag: "1.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  ingress:
    enabled: true
    className: aigateway
    host: portal.aigateway.io
    path: /
    pathType: Prefix
  session:
    secretKey: change-me-session-secret
