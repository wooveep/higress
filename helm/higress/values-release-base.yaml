global:
  local: false
  ingressClass: aigateway
  enableRedis: true
  enablePluginServer: true
  imagePullPolicy: IfNotPresent
  o11y:
    enabled: false
    grafana:
      image:
        repository: aigateway/grafana
        tag: 9.3.6
    prometheus:
      image:
        repository: aigateway/prometheus
        tag: v2.40.7
    loki:
      image:
        repository: aigateway/loki
        tag: 2.9.4
    promtail:
      image:
        repository: aigateway/promtail
        tag: 2.9.4

release:
  upstreams: []

higress-core:
  enabled: true
  mysql:
    mysql:
      enabled: false
  postgresql:
    enabled: true
    fullnameOverride: aigateway-core-postgresql
    postgresql:
      username: portal
      password: portal
      database: aigateway_portal
      postgresPassword: postgres
      replicaCount: 3
      persistence:
        enabled: true
        size: 10Gi
    pgpool:
      replicaCount: 2
  mcpServer:
    enable: true
    sse_path_suffix: /sse
    redis:
      db: 0
    match_list: []
    servers: []
  redis:
    enabled: true
    fullnameOverride: redis-server
    architecture: replication
    auth:
      enabled: true
      sentinel: true
      password: aigateway-redis
    sentinel:
      enabled: true
      masterService:
        enabled: true
    rbac:
      create: true
    serviceAccount:
      create: true
      automountServiceAccountToken: true
    master:
      persistence:
        enabled: true
        size: 1Gi
    replica:
      replicaCount: 2
      automountServiceAccountToken: true
      persistence:
        enabled: true
        size: 1Gi
  gateway:
    repository: aigateway/gateway
    tag: "2.2.0-dev-20260327030541"
    service:
      type: LoadBalancer
    hostPort:
      enabled: false
    pdb:
      enabled: false
      minAvailable: 1
  controller:
    repository: aigateway/controller
    tag: "2.2.0-dev-20260327030541"
    pdb:
      enabled: false
      minAvailable: 1
  pilot:
    repository: aigateway/pilot
    tag: "2.2.0-dev-20260327030541"
  pluginServer:
    repository: aigateway/plugin-server
    tag: "1.0.0-dev-20260327030541"
    pdb:
      enabled: false
      minAvailable: 1

aigateway-console:
  enabled: true
  name: aigateway-console
  replicaCount: 1
  controller:
    serviceName: aigateway-controller
  admin:
    username: admin
    displayName: Admin
    password: admin
  service:
    type: LoadBalancer
    port: 8080
  image:
    repository: aigateway/console
    tag: "2.2.0-dev-20260416215530"
    pullPolicy: IfNotPresent
  pluginServer:
    serviceName: aigateway-plugin-server
  certmanager:
    image:
      repository: aigateway
      tag: dev-20260327030541
  portalDatabase:
    enabled: true
    driver: postgres
    host: aigateway-core-postgresql-pgpool
    port: 5432
    database: aigateway_portal
    params: "sslmode=disable"
    secretName: aigateway-core-db
    usernameKey: username
    passwordKey: password
  podEnvs:
    AIGATEWAY_CONSOLE_K8S_ENABLED: "true"
    AIGATEWAY_CONSOLE_PORTALDB_AUTO_MIGRATE: "false"
    HIGRESS_PORTAL_CONSUMER_PROJECTION_WRITE_ENABLED: "false"

aigateway-portal:
  enabled: true
  name: aigateway-portal
  mysql:
    enabled: false
  database:
    driver: postgres
    createSecret: false
    existingSecret: aigateway-core-db
    host: aigateway-core-postgresql-pgpool
    port: 5432
    name: aigateway_portal
    username: portal
    password: portal
    params: "sslmode=disable"
  backend:
    replicaCount: 1
    dbAutoMigrate: false
    corePrometheusURL: ""
    usageSyncEnabled: true
    usageSyncSeconds: 300
    keyAuthSyncEnabled: true
    keyAuthSyncSeconds: 2
    rechargeFallbackAvgCostPer1K: 0.02
  image:
    repository: aigateway/portal
    tag: "0.2.0-dev-20260416215530"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 8081
  ingress:
    enabled: false
  session:
    secretKey: change-me-session-secret
